name: AWS_DESTROY_DOMAIN_IAC

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type 'destroy' to confirm"
        required: true
        type: string
      debug_oidc:
        description: "Print OIDC token claims to logs (DANGEROUS)"
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      confirmation:
        required: true
        type: string
      debug_oidc:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.10.0"
  TF_IN_AUTOMATION: "true"

  PROJECT_NAME: ${{ vars.APP_NAME || 'absencesbo' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  BUCKET_NAME: ${{ (vars.APP_NAME || 'absencesbo') }}-terraform-state
  INSTANCE_ACCESS_STATE_KEY: "shared/instance_access/terraform.tfstate"
  ROUTE53_STATE_KEY: "shared/route53/terraform.tfstate"
  ACM_STATE_KEY: "shared/acm/terraform.tfstate"
  LB_STATE_KEY: "shared/load_balancer/terraform.tfstate"
  DNS_STATE_KEY: "shared/dns/terraform.tfstate"
  ROUTE53_ZONE_ID: ${{ vars.ROUTE53_ZONE_ID || '' }}

concurrency:
  group: AWS_DESTROY_DOMAIN_IAC
  cancel-in-progress: false

jobs:
  destroy-domain-iac:
    runs-on: ubuntu-latest

    outputs:
      iam_role_name: ${{ steps.instance_access_snapshot.outputs.iam_role_name }}
      iam_instance_profile_name: ${{ steps.instance_access_snapshot.outputs.iam_instance_profile_name }}
      route53_zone_id: ${{ steps.route53_snapshot.outputs.route53_zone_id }}
      route53_zone_name: ${{ steps.route53_snapshot.outputs.route53_zone_name }}
      route53_name_servers: ${{ steps.route53_snapshot.outputs.route53_name_servers }}
      load_balancer_dns_name: ${{ steps.lb_snapshot.outputs.load_balancer_dns_name }}
      load_balancer_url: ${{ steps.lb_snapshot.outputs.load_balancer_url }}
      route53_record_names: ${{ steps.dns_snapshot.outputs.route53_record_names }}
      application_urls: ${{ steps.dns_snapshot.outputs.application_urls }}

    steps:
      - name: Guardrail - confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirmation }}" != "destroy" ]]; then
            echo "Confirmation failed. You must type 'destroy'."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: (Optional) Debug OIDC token claims
        if: ${{ inputs.debug_oidc }}
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
            core.info(`aud=${payload.aud}`);
            core.info(`sub=${payload.sub}`);
            core.info(`iss=${payload.iss}`);
            core.info(`repository=${payload.repository}`);
            core.info(`workflow_ref=${payload.workflow_ref}`);
            core.info(`job_workflow_ref=${payload.job_workflow_ref}`);            

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # deployer IAM role
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS identity + region
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          CURRENT_REGION="${AWS_DEFAULT_REGION:-$(aws configure get region)}"
          if [[ "$CURRENT_REGION" != "${AWS_REGION}" ]]; then
            echo "Wrong region configured: $CURRENT_REGION. Must be ${AWS_REGION}"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        shell: bash
        run: |
          set -euo pipefail
          terraform fmt -check -recursive terraform/envs/shared/instance_access terraform/envs/shared/route53 terraform/envs/shared/acm terraform/envs/shared/load_balancer terraform/envs/shared/dns

      - name: Terraform init - Instance Access
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/instance_access init -reconfigure \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=${{ env.INSTANCE_ACCESS_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform init - Route53
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/route53 init -reconfigure \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=${{ env.ROUTE53_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform init - ACM
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/acm init -reconfigure \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=${{ env.ACM_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform init - Load Balancer
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/load_balancer init -reconfigure \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=${{ env.LB_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform init - DNS
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/dns init -reconfigure \
            -backend-config="bucket=${{ env.BUCKET_NAME }}" \
            -backend-config="key=${{ env.DNS_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Snapshot Instance Access outputs
        id: instance_access_snapshot
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/envs/shared/instance_access

          IAM_ROLE_NAME="$(terraform output -raw iam_role_name 2>/dev/null || true)"
          IAM_INSTANCE_PROFILE_NAME="$(terraform output -raw iam_instance_profile_name 2>/dev/null || true)"

          echo "iam_role_name=${IAM_ROLE_NAME}" >> "$GITHUB_OUTPUT"
          echo "iam_instance_profile_name=${IAM_INSTANCE_PROFILE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Snapshot Route53 outputs
        id: route53_snapshot
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/envs/shared/route53

          ROUTE53_ZONE_ID="$(terraform output -raw route53_zone_id 2>/dev/null || true)"
          ROUTE53_ZONE_NAME="$(terraform output -raw route53_zone_name 2>/dev/null || true)"
          ROUTE53_NAME_SERVERS="$(terraform output -json route53_name_servers 2>/dev/null | jq -r 'join(", ")' || true)"

          echo "route53_zone_id=${ROUTE53_ZONE_ID}" >> "$GITHUB_OUTPUT"
          echo "route53_zone_name=${ROUTE53_ZONE_NAME}" >> "$GITHUB_OUTPUT"
          echo "route53_name_servers=${ROUTE53_NAME_SERVERS}" >> "$GITHUB_OUTPUT"

      - name: Snapshot Load Balancer outputs
        id: lb_snapshot
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/envs/shared/load_balancer

          LOAD_BALANCER_DNS_NAME="$(terraform output -raw load_balancer_dns_name 2>/dev/null || true)"
          LOAD_BALANCER_URL="$(terraform output -raw load_balancer_url 2>/dev/null || true)"

          echo "load_balancer_dns_name=${LOAD_BALANCER_DNS_NAME}" >> "$GITHUB_OUTPUT"
          echo "load_balancer_url=${LOAD_BALANCER_URL}" >> "$GITHUB_OUTPUT"

      - name: Snapshot ACM outputs
        id: acm_snapshot
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/envs/shared/acm

          ACM_CERTIFICATE_ARN="$(terraform output -raw acm_certificate_arn 2>/dev/null || true)"
          ACM_CERTIFICATE_DOMAIN_NAME="$(terraform output -raw acm_certificate_domain_name 2>/dev/null || true)"

          echo "acm_certificate_arn=${ACM_CERTIFICATE_ARN}" >> "$GITHUB_OUTPUT"
          echo "acm_certificate_domain_name=${ACM_CERTIFICATE_DOMAIN_NAME}" >> "$GITHUB_OUTPUT"

      - name: Snapshot DNS outputs
        id: dns_snapshot
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/envs/shared/dns

          ROUTE53_ZONE_ID="$(terraform output -raw route53_zone_id 2>/dev/null || true)"
          ROUTE53_ZONE_NAME="$(terraform output -raw route53_zone_name 2>/dev/null || true)"
          ROUTE53_NAME_SERVERS="$(terraform output -json route53_name_servers 2>/dev/null | jq -r 'join(", ")' || true)"
          ROUTE53_RECORD_NAMES="$(terraform output -json route53_record_names 2>/dev/null | jq -r 'join(", ")' || true)"
          APPLICATION_URLS="$(terraform output -json application_urls 2>/dev/null | jq -r 'join(", ")' || true)"

          echo "route53_zone_id=${ROUTE53_ZONE_ID}" >> "$GITHUB_OUTPUT"
          echo "route53_zone_name=${ROUTE53_ZONE_NAME}" >> "$GITHUB_OUTPUT"
          echo "route53_name_servers=${ROUTE53_NAME_SERVERS}" >> "$GITHUB_OUTPUT"
          echo "route53_record_names=${ROUTE53_RECORD_NAMES}" >> "$GITHUB_OUTPUT"
          echo "application_urls=${APPLICATION_URLS}" >> "$GITHUB_OUTPUT"

      - name: Terraform destroy - DNS
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/dns destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="route53_state_bucket=${{ env.BUCKET_NAME }}" \
            -var="route53_state_key=${{ env.ROUTE53_STATE_KEY }}" \
            -var="route53_state_region=${{ env.AWS_REGION }}" \
            -var="lb_state_bucket=${{ env.BUCKET_NAME }}" \
            -var="lb_state_key=${{ env.LB_STATE_KEY }}" \
            -var="lb_state_region=${{ env.AWS_REGION }}"

      - name: Terraform destroy - Load Balancer
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/load_balancer destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="acm_state_bucket=${{ env.BUCKET_NAME }}" \
            -var="acm_state_key=${{ env.ACM_STATE_KEY }}" \
            -var="acm_state_region=${{ env.AWS_REGION }}"

      - name: Terraform destroy - ACM
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/acm destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="route53_state_bucket=${{ env.BUCKET_NAME }}" \
            -var="route53_state_key=${{ env.ROUTE53_STATE_KEY }}" \
            -var="route53_state_region=${{ env.AWS_REGION }}"

      - name: Terraform destroy - Route53
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/route53 destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="route53_zone_id=${{ env.ROUTE53_ZONE_ID }}"

      - name: Terraform destroy - Instance Access
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/envs/shared/instance_access destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Teardown summary
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          IAM_ROLE_NAME='${{ steps.instance_access_snapshot.outputs.iam_role_name }}'
          IAM_INSTANCE_PROFILE_NAME='${{ steps.instance_access_snapshot.outputs.iam_instance_profile_name }}'
          ROUTE53_ZONE_ID='${{ steps.route53_snapshot.outputs.route53_zone_id }}'
          ROUTE53_ZONE_NAME='${{ steps.route53_snapshot.outputs.route53_zone_name }}'
          ROUTE53_NAME_SERVERS='${{ steps.route53_snapshot.outputs.route53_name_servers }}'
          ACM_CERTIFICATE_ARN='${{ steps.acm_snapshot.outputs.acm_certificate_arn }}'
          ACM_CERTIFICATE_DOMAIN_NAME='${{ steps.acm_snapshot.outputs.acm_certificate_domain_name }}'
          LOAD_BALANCER_DNS_NAME='${{ steps.lb_snapshot.outputs.load_balancer_dns_name }}'
          LOAD_BALANCER_URL='${{ steps.lb_snapshot.outputs.load_balancer_url }}'
          ROUTE53_RECORD_NAMES='${{ steps.dns_snapshot.outputs.route53_record_names }}'
          APPLICATION_URLS='${{ steps.dns_snapshot.outputs.application_urls }}'

          {
            echo "### Shared Domain Teardown Summary"
            echo ""
            echo "| Item | Value |"
            echo "| ---- | ----- |"
            echo "| Job Status | ${{ job.status }} |"
            echo "| Project | ${{ env.PROJECT_NAME }} |"
            echo "| Region | ${{ env.AWS_REGION }} |"
            echo "| Instance Access State Key | ${{ env.INSTANCE_ACCESS_STATE_KEY }} |"
            echo "| Route53 State Key | ${{ env.ROUTE53_STATE_KEY }} |"
            echo "| ACM State Key | ${{ env.ACM_STATE_KEY }} |"
            echo "| Load Balancer State Key | ${{ env.LB_STATE_KEY }} |"
            echo "| DNS State Key | ${{ env.DNS_STATE_KEY }} |"
            echo "| Previous IAM Role Name | ${IAM_ROLE_NAME:-N/A} |"
            echo "| Previous IAM Instance Profile Name | ${IAM_INSTANCE_PROFILE_NAME:-N/A} |"
            echo "| Previous Route53 Zone ID | ${ROUTE53_ZONE_ID:-N/A} |"
            echo "| Previous Route53 Zone Name | ${ROUTE53_ZONE_NAME:-N/A} |"
            echo "| Previous Route53 Name Servers | ${ROUTE53_NAME_SERVERS:-N/A} |"
            echo "| Previous ACM Certificate Domain | ${ACM_CERTIFICATE_DOMAIN_NAME:-N/A} |"
            echo "| Previous ACM Certificate ARN | ${ACM_CERTIFICATE_ARN:-N/A} |"
            echo "| Previous Route53 Record Names | ${ROUTE53_RECORD_NAMES:-N/A} |"
            echo "| Previous Application URLs | ${APPLICATION_URLS:-N/A} |"
            echo "| Previous Load Balancer DNS Name | ${LOAD_BALANCER_DNS_NAME:-N/A} |"
            echo "| Previous Load Balancer URL | ${LOAD_BALANCER_URL:-N/A} |"
            echo "| Result | Shared domain artifacts were destroyed |"
          } >> "$GITHUB_STEP_SUMMARY"